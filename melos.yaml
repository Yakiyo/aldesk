name: aldesk_monorepo

packages:
  - app/
  - packages/**

scripts:
  fmt:
    exec: dart format .

  prepare: melos bootstrap

  dev:
    exec: flutter run
    packageFilters:
      flutter: true

  gen:
    exec: dart run build_runner build
    packageFilters:
      dependsOn: "build_runner"

  test:al:
    exec: dart test
    packageFilters:
      scope: "anilist"