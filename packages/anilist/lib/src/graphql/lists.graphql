query UserList($userId: Int, $status: MediaListStatus, $mediaType: MediaType) {
  MediaListCollection(userId: $userId, status: $status, type: $mediaType, sort: UPDATED_TIME_DESC) {
    lists {
      name
      status
      entries {
        id
        progress
        media {
          ...MediaMinimalF
          type
          episodes
          chapters
        }
      }
    }
  }
}

query HomePageList($userId: Int, $mediaType: MediaType) {
  Page(perPage: 40, page: 1) {
    mediaList(userId: $userId, type: $mediaType, status: CURRENT, sort: [STATUS, UPDATED_TIME_DESC]) {
      progress
      updatedAt
      media {
        ...MediaMinimalF
        episodes
        chapters
        status
        nextAiringEpisode {
          timeUntilAiring
          episode
        }
      }
    }
  }
}