query User($id: Int, $search: String) {
  User(id: $id, search: $search) {
    ...UserMinF
    ...UserSocialsF
    ...UserSettingsF
    about(asHtml: false)
    bannerImage
    siteUrl
  }
}

query UserMin($id: Int, $search: String) {
  User(id: $id, search: $search) {
    ...UserMinF
  }
}

query Viewer {
  Viewer {
    ...UserMinF
  }
}

query UserStatisticsMin($id: Int, $search: String) {
  User(id: $id, search: $search) {
    statistics {
      anime {
        ...UserStatisticsF
      }
      manga {
        ...UserStatisticsF
      }
    }
  }
}
