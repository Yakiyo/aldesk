query MediaMin(
  $id: Int
  $type: MediaType
  $format: MediaFormat
  $status: MediaStatus
  $isAdult: Boolean
  $search: String
) {
  Media(
    id: $id
    type: $type
    format: $format
    status: $status
    isAdult: $isAdult
    search: $search
  ) {
    ...MediaMinF
  }
}

query Media(
  $id: Int
  $type: MediaType
  $format: MediaFormat
  $status: MediaStatus
  $isAdult: Boolean
  $search: String
) {
  Media(
    id: $id
    type: $type
    format: $format
    status: $status
    isAdult: $isAdult
    search: $search
  ) {
    # main info
    ...MediaMinF
    description(asHtml: false)
    idMal
    # scalar fields
    season
    seasonYear
    episodes
    duration
    chapters
    volumes
    countryOfOrigin
    isLicensed
    source
    hashtag
    updatedAt
    bannerImage
    genres
    synonyms
    averageScore
    meanScore
    popularity
    isLocked
    trending
    favourites
    isFavourite
    isFavouriteBlocked
    isAdult
    siteUrl
    autoCreateForumThread
    isRecommendationBlocked
    isReviewBlocked
    modNotes
    # non-scalar fields
    startDate {
      year
      month
      day
    }
    endDate {
      year
      month
      day
    }
    trailer {
      id
      site
      thumbnail
    }
    tags {
      id
      name
      description
    }
    nextAiringEpisode {
      id
      episode
      airingAt
      timeUntilAiring
    }
    externalLinks {
      id
      site
      url
      icon
    }
    # only take minimal info about reviews, if needed, it can be
    # fetched using the id for full info
    reviews {
      nodes {
        id
        userId
        summary
      }
    }
    stats {
      scoreDistribution {
        amount
        score
      }
      statusDistribution {
        amount
        status
      }
    }
    # relation like fields

    # only get basic info from edge, for info in node, it can
    # be fetched using the id from node
    characters {
      edges {
        id
        name
        role
        node {
          id
        }
      }
    }

    staff {
      edges {
        id
        role
        favouriteOrder
        node {
          id
        }
      }
    }
    # only get the id of the related media, can just fetch
    # the data of the media if needed
    relations {
      edges {
        id
        relationType(version: 2)
        node {
          id
        }
      }
    }
    airingSchedule {
      nodes {
        id
        airingAt
        timeUntilAiring
        episode
        mediaId
      }
    }

    recommendations(sort: ID_DESC) {
      nodes {
        id
        rating
        userRating
        mediaRecommendation {
          id
        }
        user {
          id
          name
        }
      }
    }
    studios {
      edges {
        id
        isMain
        node {
          id
          name
        }
      }
    }

    streamingEpisodes {
      title
      url
      site
      thumbnail
    }

    # applicable only if user is logged in
    mediaListEntry {
      id
      userId
      score
      status
      progress
    }
  }
}