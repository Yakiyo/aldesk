name: aldesk
description: "Anilist dekstop app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  anilist:
    path: ../packages/anilist
  flutter_expandable_fab: ^2.3.0
  go_router: ^14.6.1
  url_launcher: ^6.3.1
  dart_jsonwebtoken: ^2.14.2
  get_it: ^8.0.2
  shared_preferences: ^2.3.3
  logger: ^2.5.0
  toastification: ^2.3.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/google_fonts/

flutter_launcher_icons:
  image_path: "assets/aldesk.png"
  windows:
    generate: true
