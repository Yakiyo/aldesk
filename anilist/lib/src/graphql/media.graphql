fragment MediaMinimalFrag on Media {
  id
  title {
    romaji
    userPreferred
  }
  coverImage {
    large
    medium
  }
}

fragment MediaCategory on Media {
  type
  format
}

fragment MediaExtraInfo on Media {
  season
  seasonYear
  averageScore
  meanScore
  popularity
}

query MediaMinimal($id: Int, $search: String) {
  Media(id: $id, search: $search) {
    ...MediaMinimalFrag
  }
}

query Media($id: Int, $search: String) {
  Media(id: $id, search: $search) {
    ...MediaMinimalFrag
    ...MediaCategory
    ...MediaExtraInfo
    status
    description(asHtml: false)
    bannerImage

    startDate {
      year
      month
      day
    }
    endDate {
      year
      month
      day
    }
    
    episodes
    chapters
    volumes
    
    isLicensed
    source
    
    genres
    synonyms
    tags {
      id
      name
      description
    }
    isAdult
    
    nextAiringEpisode {
      id
      airingAt
      timeUntilAiring
      episode
    }
    
    mediaListEntry {
      id
      status
      score(format: POINT_10)
      progress
      progressVolumes
      repeat
      notes
      startedAt {
        year
        month
        day
      }
      completedAt {
        year
        month
        day
      }
    }
  }
}


query UserList($userId: Int, $status: MediaListStatus, $mediaType: MediaType) {
  MediaListCollection(userId: $userId, status: $status, type: $mediaType, sort: UPDATED_TIME_DESC) {
    lists {
      name
      status
      entries {
        id
        progress
        media {
          ...MediaMinimalFrag
          type
          episodes
          chapters
        }
      }
    }
  }
}

query HomePageList($userId: Int, $mediaType: MediaType) {
  Page(perPage: 40, page: 1) {
    mediaList(userId: $userId, type: $mediaType, status: CURRENT, sort: [STATUS, UPDATED_TIME_DESC]) {
      progress
      updatedAt
      media {
        ...MediaMinimalFrag
        episodes
        chapters
        status
        nextAiringEpisode {
          timeUntilAiring
          episode
        }
      }
    }
  }
}